<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <style>
      h1 {
      font-family: sans-serif;
      font-size: 50px;
      line-height: 1.3;
      width: 100vw;
      padding: 30px;
      text-align: center;
      /*color: white;*/
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    #resetBtn {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .num-box {
      display: flex;
      justify-content: center;
      margin: 0 auto;
      margin-bottom: 15px;
      width: 300px;
      height: 300px;
      border: 2px solid;
    }
    </style>
  </head>
  <body>

    <header>
      <h1 id="dashboard-heading">Dashboard</h1>
      <button id="theme-toggle">Toggle Dark Mode</button>
    </header>

    <div class="num-box"></div>

    <section class="counter-container">
      <div class="btn-group">
        <button id="decrease">-</button>
        <p id="counter">1</p>
        <button id="increase">+</button>
      </div>
    </section>

    <div id="resetBtn">
      <button id="reset">RESET</button>
    </div>

    <section class="users-section">
      <h1 id="users-heading">Users Section</h1>

      <div class="btn-group">
        <button id="loadBtn">USER</button>
        <p id="output"></p>
      </div>
    </section>

    <div class="">
      <h3 class="">Name: Omolade</h3>
      <p class="">Email: example@gmail.com</p>
      <p class="">Phone: +234 810 2345 9876</p>
      <p class="">Company Name:</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>           this is the html part
  </body>
</html>
